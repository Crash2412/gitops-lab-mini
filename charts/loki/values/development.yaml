loki:
  deploymentMode: SingleBinary

  loki:
    commonConfig:
      replication_factor: 1
    auth_enabled: false
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    storage:
      type: filesystem

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 5Gi
      storageClass: standard

  test:
    enabled: false

  monitoring:
    serviceMonitor:
      enabled: true

  chunksCache:
    enabled: false

  resultsCache:
    enabled: false

  backend:
    replicas: 0

  read:
    replicas: 0

  write:
    replicas: 0
