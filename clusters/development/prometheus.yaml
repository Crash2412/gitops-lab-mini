apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  labels:
    name: prometheus
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/<your-github-username>/gitops-lab-mini.git
    targetRevision: main
    path: charts/prometheus
    helm:
      valueFiles:
        - values/development.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
